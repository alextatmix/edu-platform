<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход - EduPlatform</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- Шапка -->
    <header>
      <div class="logo">EduPlatform</div>
      <nav>
        <a href="index.html">Главная</a>
        <a href="register.html">Регистрация</a>
        <a href="login.html">Вход</a>
      </nav>
    </header>

    <!-- Основной контент -->
    <main>
      <section class="register-section">
        <h1>Вход в аккаунт</h1>
        <p>Введите свои данные для входа</p>

        <!-- Форма входа -->
        <form
          action="/login"
          method="POST"
          class="register-form"
          id="login-form"
        >
          <!-- Поле: Email -->
          <div class="form-group">
            <label for="login-email">Email</label>
            <input
              type="email"
              id="login-email"
              name="email"
              placeholder="example@mail.ru"
              required
            />
            <div id="login-email-error" style="display: none"></div>
          </div>

          <!-- Поле: Пароль -->
          <div class="form-group">
            <label for="login-password">Пароль</label>
            <input
              type="password"
              id="login-password"
              name="password"
              placeholder="Введите пароль"
              required
            />
            <div id="login-password-error" style="display: none"></div>
          </div>

          <!-- Кнопка входа -->
          <button type="submit" class="btn-submit">Войти</button>

          <!-- Ссылка на регистрацию -->
          <p class="login-link">
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
          </p>
        </form>
      </section>
    </main>

    <!-- Подвал -->
    <footer>
      <p>&copy; 2024 EduPlatform. Все права защищены.</p>
    </footer>

    <!-- Cookie-баннер и скрипт входа -->
    <script src="../js/cookie-banner.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
